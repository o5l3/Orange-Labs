name: Mirror to deploy repo

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: mirror-deploy
  cancel-in-progress: false

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure SSH with deploy key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MIRROR_DEPLOY_KEY }}

      - name: Rewrite authors and force-push to deploy repo
        env:
          TARGET_REMOTE: git@github.com:orange-labs-git/orange-labs.git
          NEW_NAME: orange-labs-git
          NEW_EMAIL: labs@orangesys.co.kr
        run: |
          set -euo pipefail

          git config --global user.name "$NEW_NAME"
          git config --global user.email "$NEW_EMAIL"

          FILTER_BRANCH_SQUELCH_WARNING=1 git filter-branch -f \
            --env-filter '
              export ORIGINAL_AUTHOR_NAME="$GIT_AUTHOR_NAME"
              export ORIGINAL_AUTHOR_EMAIL="$GIT_AUTHOR_EMAIL"
              export GIT_AUTHOR_NAME="'"$NEW_NAME"'"
              export GIT_AUTHOR_EMAIL="'"$NEW_EMAIL"'"
              export GIT_COMMITTER_NAME="'"$NEW_NAME"'"
              export GIT_COMMITTER_EMAIL="'"$NEW_EMAIL"'"
            ' \
            --msg-filter '
              msg=$(cat)
              printf "%s\n\nOriginal-Author: %s <%s>\n" "$msg" "$ORIGINAL_AUTHOR_NAME" "$ORIGINAL_AUTHOR_EMAIL"
            ' \
            -- main

          git remote add target "$TARGET_REMOTE"
          git push --force target main
